<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS WEB | Streaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00e5ff; --bg: #020205; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .main-wrapper { 
            width: 100%; height: 100vh; 
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.07) 0%, #000 90%), 
                        url('https://wallpapercave.com/wp/wp1917154.jpg');
            background-size: cover; display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.5s ease; }
        .active { display: flex !important; }

        #login-screen { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px); padding: 50px; border-radius: 25px; border: 1px solid rgba(0, 229, 255, 0.2); width: 420px; text-align: center; }
        .brand-title { font-size: 2.8rem; font-weight: 800; margin-bottom: 5px; letter-spacing: 4px; text-transform: uppercase; }
        .brand-title span { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        .sub-brand { opacity: 0.5; font-size: 12px; letter-spacing: 3px; margin-bottom: 35px; }

        input { width: 100%; padding: 16px; margin-bottom: 18px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 16px; }
        .btn-login { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--neon); color: #000; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        .menu-grid { display: flex; gap: 25px; justify-content: center; margin-top: 40px; }
        .card {
            width: 190px; height: 190px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; backdrop-filter: blur(10px);
        }
        .card:hover { border: 2px solid var(--neon); transform: scale(1.1); box-shadow: 0 0 35px rgba(0, 229, 255, 0.4); }
        .card i { font-size: 55px; color: #fff; margin-bottom: 15px; }
        .card:hover i { color: var(--neon); }
        .card span { font-weight: 700; font-size: 14px; text-transform: uppercase; }

        .content-container { width: 90%; height: 80%; background: rgba(0,0,0,0.8); border-radius: 20px; padding: 30px; border: 1px solid var(--glass); overflow-y: auto; }
        .btn-back { position: absolute; top: 30px; left: 50px; background: var(--glass); border: 1px solid white; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; z-index: 10; }
        
        .category-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .cat-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; cursor: pointer; text-align: center; border: 1px solid transparent; transition: 0.3s; }
        .cat-card:hover { background: var(--neon); color: black; font-weight: bold; }

        .footer { position: absolute; bottom: 30px; width: 100%; padding: 0 50px; display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.4); pointer-events: none; }
        
        #loader { display: none; margin: 10px auto; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--neon); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    
    <div id="screen-login" class="screen active">
        <div id="login-screen">
            <div class="brand-title">ATLAS <span>WEB</span></div>
            <div class="sub-brand">PREMIUM STREAMING</div>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <div id="loader"></div>
            <button class="btn-login" id="btnLogin" onclick="handleLogin()">Entrar agora</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div class="brand-title">ATLAS <span>WEB</span></div>
        <div class="menu-grid">
            <div class="card" onclick="nav('screen-tv')"><i class="fas fa-tv"></i><span>TV ao vivo</span></div>
            <div class="card" onclick="nav('screen-movies')"><i class="fas fa-film"></i><span>Filmes</span></div>
            <div class="card" onclick="nav('screen-series')"><i class="fas fa-video"></i><span>Séries</span></div>
            <div class="card" onclick="nav('screen-lists')"><i class="fas fa-list-ul"></i><span>Listas</span></div>
            <div class="card" onclick="nav('screen-settings')"><i class="fas fa-user-cog"></i><span>Ajustes</span></div>
        </div>
    </div>

    <div id="screen-tv" class="screen">
        <button class="btn-back" onclick="nav('screen-menu')"><i class="fas fa-arrow-left"></i> Voltar</button>
        <div class="content-container">
            <h2><i class="fas fa-tv"></i> Grade de Canais</h2>
            <hr style="opacity: 0.1">
            <div id="tv-categories" class="category-list">
                <p>Carregando categorias...</p>
            </div>
        </div>
    </div>

    <div id="screen-movies" class="screen"><button class="btn-back" onclick="nav('screen-menu')">Voltar</button><h1>Filmes</h1></div>
    <div id="screen-series" class="screen"><button class="btn-back" onclick="nav('screen-menu')">Voltar</button><h1>Séries</h1></div>
    <div id="screen-lists" class="screen"><button class="btn-back" onclick="nav('screen-menu')">Voltar</button><h1>Minhas Listas</h1></div>
    <div id="screen-settings" class="screen"><button class="btn-back" onclick="nav('screen-menu')">Voltar</button><h1>Configurações</h1></div>

    <div class="footer">
        <div>Versão 1.0.47 | Atlas Servers</div>
        <div style="text-align: right;">ID: 457702 | MAC: 66:88:F3:77:B5:E2</div>
    </div>
</div>

<script>
    const DNS_SERVER = "http://atlasplay.shop"; 

    function nav(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(screenId);
        if(target) target.classList.add('active');
    }

    async function handleLogin() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const loader = document.getElementById('loader');
        const btn = document.getElementById('btnLogin');

        if(!user || !pass) return alert("Preencha usuário e senha!");

        loader.style.display = "block";
        btn.style.display = "none";

        try {
            // Testando a API Xtream
            const url = `${DNS_SERVER}/player_api.php?username=${user}&password=${pass}&action=get_live_categories`;
            const response = await fetch(url);
            
            if (!response.ok) throw new Error('Erro na rede');

            const data = await response.json();
            
            // Se a API retornar dados, preenchemos a tela de TV
            const catContainer = document.getElementById('tv-categories');
            catContainer.innerHTML = ""; 

            if(Array.isArray(data)) {
                data.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'cat-card';
                    div.innerText = cat.category_name;
                    catContainer.appendChild(div);
                });
                nav('screen-menu');
            } else {
                alert("Falha na autenticação ou servidor sem resposta.");
            }

        } catch (error) {
            console.error(error);
            alert("Erro ao conectar no servidor. Verifique o CORS no seu Nginx.");
        } finally {
            loader.style.display = "none";
            btn.style.display = "block";
        }
    }
</script>

</body>
</html>
