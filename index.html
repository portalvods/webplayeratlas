<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS WEB | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --neon: #00e5ff; --bg: #020205; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .main-wrapper { 
            width: 100%; height: 100vh; 
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.1) 0%, #000 100%), 
                        url('https://wallpapercave.com/wp/wp1917154.jpg');
            background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center;
        }

        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.4s ease; padding: 30px; }
        .active { display: flex !important; }

        .logo-container { margin-bottom: 20px; text-align: center; }
        .logo-container img { width: 180px; filter: drop-shadow(0 0 10px var(--neon)); }

        #login-box { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); padding: 40px; border-radius: 20px; border: 1px solid var(--neon); width: 380px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.08); border: 1px solid rgba(0,229,255,0.3); border-radius: 10px; color: white; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--neon); color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .menu-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1100px; }
        .menu-item { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 30px;
            text-align: center; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .menu-item:hover { border-color: var(--neon); transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 229, 255, 0.4); }
        .menu-item i { font-size: 45px; display: block; margin-bottom: 15px; color: var(--neon); }
        .menu-item span { font-weight: bold; font-size: 14px; }

        .content-area { width: 100%; height: 85%; background: rgba(0,0,0,0.85); border-radius: 20px; padding: 25px; border: 1px solid var(--glass); overflow-y: auto; }
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .item-card { background: #111; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .item-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .item-card img { width: 100%; height: 230px; object-fit: cover; }
        .item-card p { padding: 10px; font-size: 11px; margin: 0; text-align: center; }

        #screen-player { background: #000; z-index: 999; padding: 0; }
        #video-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; background: #000; }
        .close-player { position: absolute; top: 20px; right: 20px; background: red; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; z-index: 1001; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="screen-login" class="screen active">
        <div id="login-box">
            <img src="https://i.imgur.com/uU6Wk4R.png" style="width: 150px; margin-bottom: 20px;">
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-main" onclick="handleLogin()">Entrar</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div class="logo-container"><img src="https://i.imgur.com/uU6Wk4R.png"></div>
        <div class="menu-grid">
            <div class="menu-item" onclick="loadCategories('live')"><i class="fas fa-tv"></i><span>CANAIS</span></div>
            <div class="menu-item" onclick="loadCategories('movies')"><i class="fas fa-film"></i><span>FILMES</span></div>
            <div class="menu-item" onclick="loadCategories('series')"><i class="fas fa-video"></i><span>SÉRIES</span></div>
            <div class="menu-item" onclick="nav('screen-settings')"><i class="fas fa-cog"></i><span>AJUSTES</span></div>
            <div class="menu-item" onclick="location.reload()"><i class="fas fa-sync"></i><span>SAIR</span></div>
        </div>
    </div>

    <div id="screen-content" class="screen">
        <div style="width:100%; display:flex; justify-content: space-between; margin-bottom: 15px;">
            <button class="btn-main" style="width: 100px;" onclick="nav('screen-menu')">Voltar</button>
            <h2 id="cat-title">Atlas Servers</h2>
            <div style="width:100px;"></div>
        </div>
        <div class="content-area" id="content-list"></div>
    </div>

    <div id="screen-player" class="screen">
        <button class="close-player" onclick="closePlayer()">FECHAR</button>
        <div id="video-container">
            <video id="main-video" controls autoplay playsinline></video>
        </div>
    </div>

    <div id="screen-settings" class="screen">
        <button class="btn-main" style="width: 100px;" onclick="nav('screen-menu')">Voltar</button>
        <div class="content-area" style="margin-top:20px;">
            <h3>Configurações</h3>
            <p>DNS: atlasplay.shop</p>
            <p>Player: HLS.JS (Auto)</p>
        </div>
    </div>
</div>

<script>
    const DNS = "http://atlasplay.shop";
    // Proxy alternativo mais robusto
    const PROXY = "https://corsproxy.io/?"; 
    let auth = { user: '', pass: '' };
    let hls = null;

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function apiReq(action, extra = '') {
        const url = `${DNS}/player_api.php?username=${auth.user}&password=${auth.pass}&action=${action}${extra}`;
        try {
            const r = await fetch(PROXY + encodeURIComponent(url));
            const text = await r.text();
            // Tenta limpar o JSON se vier com lixo do servidor
            const cleanJson = text.substring(text.indexOf('['), text.lastIndexOf(']') + 1) || text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
            return JSON.parse(cleanJson);
        } catch (e) {
            console.log("Erro API:", e);
            return null;
        }
    }

    async function handleLogin() {
        auth.user = document.getElementById('user').value;
        auth.pass = document.getElementById('pass').value;
        const data = await apiReq('');
        if(data && data.user_info.auth === 1) nav('screen-menu');
        else alert("Erro de Login!");
    }

    async function loadCategories(type) {
        const list = document.getElementById('content-list');
        list.innerHTML = "Carregando Categorias...";
        nav('screen-content');
        
        let act = type === 'live' ? 'get_live_categories' : type === 'movies' ? 'get_vod_categories' : 'get_series_categories';
        const data = await apiReq(act);
        
        if(!data || data.length === 0) { list.innerHTML = "Nenhuma categoria encontrada."; return; }

        list.innerHTML = `<div class="item-grid"></div>`;
        data.forEach(c => {
            const d = document.createElement('div');
            d.className = 'item-card';
            d.onclick = () => loadItems(type, c.category_id);
            d.innerHTML = `<div style="height:120px; display:flex; align-items:center; justify-content:center; background:#111;"><i class="fas fa-folder" style="font-size:40px; color:var(--neon)"></i></div><p>${c.category_name}</p>`;
            list.querySelector('.item-grid').appendChild(d);
        });
    }

    async function loadItems(type, id) {
        const list = document.getElementById('content-list');
        list.innerHTML = "Buscando conteúdo...";
        let act = type === 'live' ? 'get_live_streams' : type === 'movies' ? 'get_vod_streams' : 'get_series';
        
        const data = await apiReq(act, `&category_id=${id}`);
        if(!data) { list.innerHTML = "Erro ao carregar itens."; return; }

        list.innerHTML = `<div class="item-grid"></div>`;
        data.forEach(i => {
            const d = document.createElement('div');
            d.className = 'item-card';
            d.onclick = () => play(type, i.stream_id || i.series_id);
            const img = i.stream_icon || i.cover || 'https://via.placeholder.com/160x230/111/fff?text=ATLAS';
            d.innerHTML = `<img src="${img}" loading="lazy"><p>${i.name || i.title}</p>`;
            list.querySelector('.item-grid').appendChild(d);
        });
    }

    function play(type, id) {
        const v = document.getElementById('main-video');
        const streamUrl = `${DNS}/${type === 'live' ? 'live' : 'movie'}/${auth.user}/${auth.pass}/${id}.m3u8`;
        nav('screen-player');

        if (Hls.isSupported()) {
            if(hls) hls.destroy();
            hls = new Hls({ xhrSetup: xhr => { xhr.withCredentials = false; } });
            hls.loadSource(streamUrl);
            hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        } else {
            v.src = streamUrl;
        }
    }

    function closePlayer() {
        const v = document.getElementById('main-video');
        v.pause(); v.src = "";
        if(hls) hls.destroy();
        nav('screen-content');
    }
</script>
</body>
</html>
