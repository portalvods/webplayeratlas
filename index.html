<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS WEB | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --neon: #00e5ff; --bg: #020205; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .main-wrapper { 
            width: 100%; height: 100vh; 
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.1) 0%, #000 100%), 
                        url('https://wallpapercave.com/wp/wp1917154.jpg');
            background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center;
        }

        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.4s ease; padding: 30px; }
        .active { display: flex !important; }

        #login-box { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); padding: 40px; border-radius: 20px; border: 1px solid var(--neon); width: 380px; text-align: center; box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.08); border: 1px solid rgba(0,229,255,0.3); border-radius: 10px; color: white; font-size: 16px; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--neon); color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--neon); }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 800px; }
        .menu-item { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .menu-item:hover { border-color: var(--neon); transform: scale(1.05); }
        .menu-item i { font-size: 40px; display: block; margin-bottom: 10px; color: var(--neon); }

        .content-area { width: 100%; height: 80%; background: rgba(0,0,0,0.8); border-radius: 20px; padding: 20px; overflow-y: auto; border: 1px solid var(--glass); }
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .item-card { background: #111; border-radius: 8px; overflow: hidden; cursor: pointer; text-align: center; border: 1px solid transparent; }
        .item-card:hover { border-color: var(--neon); }
        .item-card img { width: 100%; height: 210px; object-fit: cover; }
        .item-card p { font-size: 12px; padding: 8px; margin: 0; }

        #screen-player { background: #000; z-index: 9999; }
        video { width: 100%; height: 100%; }
        .close-player { position: absolute; top: 20px; right: 20px; background: red; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; z-index: 10000; border-radius: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="screen-login" class="screen active">
        <div id="login-box">
            <img src="https://i.imgur.com/uU6Wk4R.png" style="width: 150px; margin-bottom: 20px;">
            <input type="text" id="user" placeholder="Usuário Atlas">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-main" id="login-btn" onclick="handleLogin()">Acessar Agora</button>
            <p id="login-status" style="margin-top:15px; font-size:12px; color:var(--neon); display:none;">Verificando...</p>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div class="menu-grid">
            <div class="menu-item" onclick="loadCategories('live')"><i class="fas fa-tv"></i><span>CANAIS</span></div>
            <div class="menu-item" onclick="loadCategories('movies')"><i class="fas fa-film"></i><span>FILMES</span></div>
            <div class="menu-item" onclick="loadCategories('series')"><i class="fas fa-video"></i><span>SÉRIES</span></div>
        </div>
        <button class="btn-main" style="width: 200px; margin-top: 20px; background: #333; color: #fff;" onclick="location.reload()">Sair</button>
    </div>

    <div id="screen-content" class="screen">
        <div style="width:100%; display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <button class="btn-main" style="width: 100px; padding: 10px;" onclick="nav('screen-menu')">Voltar</button>
            <h3 id="cat-title">Atlas Premium</h3>
            <div style="width:100px;"></div>
        </div>
        <div class="content-area" id="content-list"></div>
    </div>

    <div id="screen-player" class="screen">
        <button class="close-player" onclick="closePlayer()">FECHAR X</button>
        <video id="main-video" controls autoplay playsinline></video>
    </div>
</div>

<script>
    const DNS = "http://atlasplay.shop";
    const PROXY = "https://api.allorigins.win/raw?url=";
    let auth = { user: '', pass: '' };
    let hls = null;

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function callApi(action, extra = '') {
        const url = `${DNS}/player_api.php?username=${auth.user}&password=${auth.pass}&action=${action}${extra}`;
        try {
            const resp = await fetch(PROXY + encodeURIComponent(url));
            const txt = await resp.text();
            // Limpa lixo do JSON se houver
            const start = txt.indexOf('[');
            const startObj = txt.indexOf('{');
            const finalStart = (start !== -1 && (start < startObj || startObj === -1)) ? start : startObj;
            const clean = txt.substring(finalStart);
            return JSON.parse(clean);
        } catch (e) {
            console.error("Erro na resposta:", e);
            return null;
        }
    }

    async function handleLogin() {
        const btn = document.getElementById('login-btn');
        const status = document.getElementById('login-status');
        
        auth.user = document.getElementById('user').value;
        auth.pass = document.getElementById('pass').value;

        if(!auth.user || !auth.pass) return alert("Preencha os campos!");

        btn.disabled = true;
        status.style.display = "block";
        status.innerText = "Conectando ao servidor Atlas...";

        const data = await callApi('');
        
        if(data && (data.user_info || data.user_info?.auth === 1)) {
            nav('screen-menu');
        } else {
            alert("Erro de Login! Verifique usuário e senha.");
            btn.disabled = false;
            status.style.display = "none";
        }
    }

    async function loadCategories(type) {
        const container = document.getElementById('content-list');
        container.innerHTML = "Carregando Categorias...";
        nav('screen-content');
        
        let act = type === 'live' ? 'get_live_categories' : type === 'movies' ? 'get_vod_categories' : 'get_series_categories';
        const data = await callApi(act);
        
        if(!data) { container.innerHTML = "Erro ao carregar."; return; }

        container.innerHTML = `<div class="item-grid"></div>`;
        data.forEach(c => {
            const div = document.createElement('div');
            div.className = 'item-card';
            div.onclick = () => loadItems(type, c.category_id);
            div.innerHTML = `<div style="height:120px; display:flex; align-items:center; justify-content:center; background:#111;"><i class="fas fa-folder" style="font-size:40px; color:var(--neon)"></i></div><p>${c.category_name}</p>`;
            container.querySelector('.item-grid').appendChild(div);
        });
    }

    async function loadItems(type, catId) {
        const container = document.getElementById('content-list');
        container.innerHTML = "Buscando conteúdos...";
        let act = type === 'live' ? 'get_live_streams' : type === 'movies' ? 'get_vod_streams' : 'get_series';
        
        const data = await callApi(act, `&category_id=${catId}`);
        if(!data) return;

        container.innerHTML = `<div class="item-grid"></div>`;
        data.forEach(i => {
            const div = document.createElement('div');
            div.className = 'item-card';
            div.onclick = () => play(type, i.stream_id || i.series_id);
            const thumb = i.stream_icon || i.cover || 'https://via.placeholder.com/150x210/111/fff?text=ATLAS';
            div.innerHTML = `<img src="${thumb}"><p>${i.name || i.title}</p>`;
            container.querySelector('.item-grid').appendChild(div);
        });
    }

    function play(type, id) {
        const video = document.getElementById('main-video');
        const folder = type === 'live' ? 'live' : 'movie';
        const url = `${DNS}/${folder}/${auth.user}/${auth.pass}/${id}.m3u8`;
        
        nav('screen-player');

        if (Hls.isSupported()) {
            if(hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
        }
    }

    function closePlayer() {
        const v = document.getElementById('main-video');
        v.pause(); v.src = "";
        if(hls) hls.destroy();
        nav('screen-content');
    }
</script>
</body>
</html>
